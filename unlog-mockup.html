<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unlog — Today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" />
  <style>
    :root {
      /* Defaults — overwritten by Tweaks at runtime */
      --paper:        #FAF8F4;
      --paper-2:      #F4F0E7;
      --ink:          #1F1B16;
      --ink-2:        #4A4339;
      --ink-mute:     #8A8275;
      --rule:         #E8E1D4;
      --rule-soft:    #EFEAE0;
      --accent:       #D97757;
      --accent-soft:  #F4D9C9;
      --accent-deep:  #B5573B;

      --font-display: 'Newsreader', Georgia, 'Times New Roman', serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "ss01", "cv11";
    }
    a { color: inherit; }
    button { font-family: inherit; color: inherit; }

    /* Sunrise wash painted under the page top */
    .dawn-wash {
      position: fixed;
      inset: 0 0 auto 0;
      height: 540px;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 90% 60% at 75% 0%, color-mix(in oklab, var(--accent) 18%, transparent) 0%, transparent 65%),
        radial-gradient(ellipse 70% 55% at 20% -10%, color-mix(in oklab, var(--accent) 8%, transparent) 0%, transparent 60%),
        linear-gradient(180deg, color-mix(in oklab, var(--accent) 4%, var(--paper)) 0%, var(--paper) 100%);
    }
    #root { position: relative; z-index: 1; }

    /* utilities used by jsx */
    .mono { font-family: var(--font-mono); font-feature-settings: "ss01"; }
    .serif { font-family: var(--font-display); }
    .label-tiny {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-mute);
      font-weight: 400;
    }

    /* inline edit affordance */
    .inline-edit {
      display: inline-block;
      cursor: text;
      border-bottom: 1px dashed transparent;
      transition: border-color .15s ease, background .15s ease;
      padding: 0 2px;
      margin: 0 -2px;
      border-radius: 2px;
    }
    .inline-edit:hover { border-bottom-color: var(--accent); background: color-mix(in oklab, var(--accent) 6%, transparent); }
    .inline-edit:focus {
      outline: none;
      border-bottom-color: var(--accent);
      background: color-mix(in oklab, var(--accent) 9%, transparent);
    }
    .inline-edit[contenteditable="true"] { caret-color: var(--accent); }

    /* shimmer for "next up" milestone dots */
    @keyframes haloPulse {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 35%, transparent); }
      50%      { box-shadow: 0 0 0 8px color-mix(in oklab, var(--accent) 0%, transparent); }
    }

    /* fade-in on mount */
    .rise { opacity: 1; }

    /* selection */
    ::selection { background: var(--accent-soft); color: var(--ink); }

    /* responsive baseline */
    @media (max-width: 880px) {
      body { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="dawn-wash"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="journey.jsx"></script>
  <script type="text/babel" src="timeline.jsx"></script>
  <script type="text/babel" src="threads.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
