<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unique Values of g^x mod n</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
    }
    h1 {
      margin-bottom: 8px;
    }
    h2 {
      margin-top: 32px;
    }
    h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }
    p {
      margin-top: 0;
      color: #444;
    }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid #ccc;
      margin-bottom: 24px;
    }
    table {
      border-collapse: collapse;
      min-width: 640px;
    }
    th, td {
      border: 1px solid #999;
      padding: 6px 10px;
      text-align: center;
    }
    th {
      background: #f3f3f3;
      position: sticky;
      top: 0;
    }
    tbody th {
      background: #fafafa;
      position: sticky;
      left: 0;
    }
    code {
      background: #f5f5f5;
      padding: 2px 4px;
      border-radius: 4px;
    }
    pre {
      background: #f8f8f8;
      padding: 12px;
      border: 1px solid #ddd;
      overflow: auto;
    }
    .charts-grid {
      display: block;
      margin-bottom: 24px;
    }
    .chart-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .chart svg {
      display: block;
      width: 100%;
      height: auto;
    }
    .axis path,
    .axis line {
      stroke: #888;
    }
    .grid line {
      stroke: #e5e5e5;
    }
    .grid path {
      stroke-width: 0;
    }
    .line {
      fill: none;
      stroke: steelblue;
      stroke-width: 2;
    }
    .dot {
      fill: steelblue;
    }
    .axis-label {
      font-size: 12px;
      fill: #333;
    }
    .legend-item {
      cursor: pointer;
    }
    .legend-item text {
      user-select: none;
    }
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #bbb;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #222;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      display: none;
      white-space: nowrap;
    }
    .selection-panel {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .selection-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .selection-field label {
      font-size: 12px;
      color: #444;
    }
    .selection-field input {
      padding: 8px 10px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 14px;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <h1>Counts of Unique Values in X = g^x mod n</h1>
  <p>
    Rows are <code>n = 9..99</code>, columns are <code>g = 2..7</code>.
    Each cell contains the number of unique values in the set
    <code>{ g^x mod n | x = 1..n }</code>.
  </p>

  

  <h2>D3 Plot</h2>
  <p>
    This combined chart shows the normalized count
    <code>unique_count / (n - 1)</code> as a function of <code>n</code>
    for each fixed base <code>g = 2..7</code>.
  </p>
  <div id="charts" class="charts-grid"></div>
  <div id="tooltip" class="tooltip"></div>
  <div class="selection-panel">
    <div class="selection-field">
      <label for="selectedG">g</label>
      <input id="selectedG" type="text" readonly value="" />
    </div>
    <div class="selection-field">
      <label for="selectedN">n</label>
      <input id="selectedN" type="text" readonly value="" />
    </div>
    <div class="selection-field">
      <label for="selectedValue">normalized value</label>
      <input id="selectedValue" type="text" readonly value="" />
    </div>
  </div>

  <script>
    function modPow(base, exponent, modulus) {
      let result = 1;
      let b = base % modulus;
      let e = exponent;

      while (e > 0) {
        if (e % 2 === 1) {
          result = (result * b) % modulus;
        }
        b = (b * b) % modulus;
        e = Math.floor(e / 2);
      }

      return result;
    }

    function uniqueCountFor(n, g) {
      const values = new Set();
      for (let x = 1; x <= n; x++) {
        values.add(modPow(g, x, n));
      }
      return values.size;
    }

    // 2D array: each row starts with n, followed by counts for g = 2..7
    const tableData = [];

    for (let n = 9; n <= 199; n+=1) {
      const row = [n];
      for (let g = 2; g <= 7; g++) {
        row.push(uniqueCountFor(n, g));
      }
      tableData.push(row);
    }

    function renderTable(data) {
      const table = document.getElementById('resultTable');

      const thead = document.createElement('thead');
      const headRow = document.createElement('tr');

      const nHeader = document.createElement('th');
      nHeader.textContent = 'n';
      headRow.appendChild(nHeader);

      for (let g = 2; g <= 7; g++) {
        const th = document.createElement('th');
        th.textContent = `g=${g}`;
        headRow.appendChild(th);
      }

      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');

      for (const row of data) {
        const tr = document.createElement('tr');

        const rowHeader = document.createElement('th');
        rowHeader.textContent = row[0];
        tr.appendChild(rowHeader);

        for (let i = 1; i < row.length; i++) {
          const td = document.createElement('td');
          td.textContent = row[i];
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
    }

    function renderCharts(data) {
      const chartsContainer = document.getElementById('charts');
      chartsContainer.innerHTML = '';

      const gValues = [2, 3, 4, 5, 6, 7];
      // Only g=2 visible by default
      const active = new Set([2]);

      const series = gValues.map((g, index) => ({
        g,
        values: data.map(row => ({
          n: row[0],
          value: row[index + 1] / (row[0] - 1)
        }))
      }));

      const card = document.createElement('div');
      card.className = 'chart-card';

      const title = document.createElement('h3');
      title.textContent = 'Normalized unique count for g = 2..7';
      card.appendChild(title);

      const chartDiv = document.createElement('div');
      chartDiv.className = 'chart';
      card.appendChild(chartDiv);

      chartsContainer.appendChild(card);

      const width = 960;
      const height = 520;
      const margin = { top: 20, right: 120, bottom: 50, left: 55 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;

      const svg = d3.select(chartDiv)
        .append('svg')
        .attr('viewBox', `0 0 ${width} ${height}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      const plot = svg.append('g')
        .attr('transform', `translate(${margin.left},${margin.top})`);

      const xScale = d3.scaleLinear()
        .domain(d3.extent(data, d => d[0]))
        .range([0, innerWidth]);

      const yScale = d3.scaleLinear()
        .domain([0, 1])
        .range([innerHeight, 0]);

      const xGrid = d3.axisBottom(xScale)
        .tickSize(-innerHeight)
        .tickFormat('');

      const yGrid = d3.axisLeft(yScale)
        .tickSize(-innerWidth)
        .tickFormat('');

      plot.append('g')
        .attr('class', 'grid')
        .attr('transform', `translate(0,${innerHeight})`)
        .call(xGrid);

      plot.append('g')
        .attr('class', 'grid')
        .call(yGrid);

      const line = d3.line()
        .x(d => xScale(d.n))
        .y(d => yScale(d.value));

      // simple primality test
      function isPrime(n) {
        if (n < 2) return false;
        if (n % 2 === 0) return n === 2;
        for (let i = 3; i * i <= n; i += 2) {
          if (n % i === 0) return false;
        }
        return true;
      }

      const primes = data.map(d => d[0]).filter(isPrime);

      // vertical lines for primes
      plot.append('g')
        .selectAll('line')
        .data(primes)
        .enter()
        .append('line')
        .attr('x1', d => xScale(d))
        .attr('x2', d => xScale(d))
        .attr('y1', 0)
        .attr('y2', innerHeight)
        .attr('stroke', 'green')
        .attr('stroke-width', 1)
        .attr('opacity', 0.4);

      const color = d3.scaleOrdinal()
        .domain(gValues)
        .range(d3.schemeTableau10);

      const seriesGroup = plot.append('g');
      const tooltip = d3.select('#tooltip');

      const lineGroups = seriesGroup.selectAll('.series-line')
        .data(series)
        .enter()
        .append('path')
        .attr('class', 'series-line')
        .attr('fill', 'none')
        .attr('stroke', d => color(d.g))
        .attr('stroke-width', 2)
        .attr('d', d => line(d.values));

      const pointGroups = seriesGroup.selectAll('.series-points')
        .data(series)
        .enter()
        .append('g')
        .attr('class', 'series-points');

      function updateSelectionFields(d) {
        document.getElementById('selectedG').value = d.g;
        document.getElementById('selectedN').value = d.n;
        document.getElementById('selectedValue').value = d.value.toFixed(6);
      }

      pointGroups.selectAll('circle')
        .data(d => d.values.map(v => ({ ...v, g: d.g })))
        .enter()
        .append('circle')
        .attr('cx', d => xScale(d.n))
        .attr('cy', d => yScale(d.value))
        .attr('r', 3)
        .attr('fill', d => color(d.g))
        .attr('stroke', '#fff')
        .attr('stroke-width', 1)
        .on('mouseenter', function(event, d) {
          d3.select(this).attr('r', 5);
          tooltip
            .style('display', 'block')
            .html(
              `<strong>g = ${d.g}</strong><br>` +
              `n = ${d.n}<br>` +
              `value = ${d.value.toFixed(4)}`
            );
        })
        .on('mousemove', function(event) {
          tooltip
            .style('left', `${event.pageX + 12}px`)
            .style('top', `${event.pageY - 28}px`);
        })
        .on('mouseleave', function() {
          d3.select(this).attr('r', 3);
          tooltip.style('display', 'none');
        })
        .on('click', function(event, d) {
          updateSelectionFields(d);
        });

      plot.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(0,${innerHeight})`)
        .call(d3.axisBottom(xScale));

      plot.append('g')
        .attr('class', 'axis')
        .call(d3.axisLeft(yScale));

      svg.append('text')
        .attr('class', 'axis-label')
        .attr('x', margin.left + innerWidth / 2)
        .attr('y', height - 10)
        .attr('text-anchor', 'middle')
        .text('n');

      svg.append('text')
        .attr('class', 'axis-label')
        .attr('transform', `translate(16, ${margin.top + innerHeight / 2}) rotate(-90)`)
        .attr('text-anchor', 'middle')
        .text('unique count / (n - 1)');

      const legend = svg.append('g')
        .attr('transform', `translate(${width - margin.right + 20}, ${margin.top + 10})`);

      function refreshVisibility() {
        lineGroups
          .attr('display', d => active.has(d.g) ? null : 'none')
          .attr('opacity', d => active.has(d.g) ? 1 : 0.15);

        pointGroups
          .attr('display', d => active.has(d.g) ? null : 'none')
          .attr('opacity', d => active.has(d.g) ? 1 : 0.15);

        legend.selectAll('.legend-item').each(function(g) {
          const item = d3.select(this);
          const isActive = active.has(g);
          item.select('line').attr('opacity', isActive ? 1 : 0.25);
          item.select('text').attr('opacity', isActive ? 1 : 0.4);
        });
      }

      const legendItems = legend.selectAll('.legend-item')
        .data(gValues)
        .enter()
        .append('g')
        .attr('class', 'legend-item')
        .attr('transform', (g, i) => `translate(0, ${i * 24})`)
        .on('click', function(event, g) {
          if (active.has(g)) {
            active.delete(g);
          } else {
            active.add(g);
          }
          refreshVisibility();
        });

      legendItems.append('line')
        .attr('x1', 0)
        .attr('x2', 24)
        .attr('y1', 0)
        .attr('y2', 0)
        .attr('stroke', g => color(g))
        .attr('stroke-width', 3);

      legendItems.append('text')
        .attr('x', 32)
        .attr('y', 4)
        .text(g => `g = ${g}`);

      refreshVisibility();
    }

    
    renderCharts(tableData);

    window.tableData = tableData;
  </script>
</body>
</html>
